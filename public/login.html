<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Luciano Cargas</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <!-- Fondo animado -->
    <div class="animated-background"></div>
    
    <!-- Contenedor del login -->
    <div class="login-container">
        <div class="login-card">
            <!-- Logo/Header -->
            <div class="login-header">
                <h1>Luciano Cargas</h1>
                <p>Sistema de Gestión</p>
            </div>
            
            <!-- Formulario -->
            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="tu@email.com"
                        required
                        autocomplete="email"
                    >
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="••••••••"
                        required
                        autocomplete="current-password"
                    >
                </div>
                
                <!-- Mensaje de error -->
                <div id="error-message" class="error-message" style="display: none;"></div>
                
                <!-- Botón de login -->
                <button type="submit" class="btn-login" id="btn-login">
                    <span class="btn-text">Iniciar Sesión</span>
                    <span class="btn-loader" aria-hidden="true">
                        <span class="spinner"></span>
                    </span>
                </button>
            </form>
            
            <!-- Footer -->
            <div class="login-footer">
                <p>&copy; 2026 Luciano Cargas. Todos los derechos reservados.</p>
            </div>
        </div>
    </div>
    
    <script src="auth.js"></script>
    <script>
        // Manejo del formulario de login
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('login-form');
            const btnLogin = document.getElementById('btn-login');
            const errorMessage = document.getElementById('error-message');
            
            // Si ya está autenticado, redirigir a la app
            if (Auth.isAuthenticated()) {
                window.location.href = 'index.html';
                return;
            }
            
            // Manejar envío del formulario
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                
                // Validación básica
                if (!email || !password) {
                    showError('Por favor, completa todos los campos');
                    return;
                }
                
                // Mostrar estado de carga
                btnLogin.disabled = true;
                btnLogin.classList.add('loading');
                errorMessage.style.display = 'none';
                
                try {
                    // Intentar login
                    const result = await Auth.login(email, password);
                    
                    if (result.success) {
                        // Login exitoso - redirigir a la app
                        window.location.href = 'index.html';
                    } else {
                        // Mostrar error
                        showError(result.error);
                        btnLogin.disabled = false;
                        btnLogin.classList.remove('loading');
                    }
                } catch (error) {
                    showError('Error inesperado. Intenta nuevamente.');
                    btnLogin.disabled = false;
                    btnLogin.classList.remove('loading');
                }
            });
            
            // Función para mostrar errores
            function showError(message) {
                errorMessage.textContent = message;
                errorMessage.style.display = 'block';
                
                // Shake animation
                errorMessage.classList.remove('shake');
                void errorMessage.offsetWidth; // Trigger reflow
                errorMessage.classList.add('shake');
            }
        });
    </script>
</body>
</html>
